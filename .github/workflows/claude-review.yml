name: Claude Code Review

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      (github.event_name == 'pull_request' && github.event.label.name == 'claude-review') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      checks: read
    steps:
      - uses: toriihq/claude-review-action@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          context-intro: "You are a code reviewer for claude-review-action — a reusable GitHub Action (bash composite) that orchestrates AI-powered code reviews using Claude."
          critical-rules: |
            1. All bash scripts MUST use set -euo pipefail
            2. All gh API calls MUST have error handling (|| true or explicit check)
            3. No hardcoded repo names or org names — always use $REPO variable
            4. All GitHub Actions outputs MUST use unique EOF delimiters to prevent injection
          review-authority: request-changes
